<!DOCTYPE html>
<html>
<head>
    <title>AI Email Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        input, select {
            padding: 10px;
            margin: 10px;
            border-radius: 6px;
        }

        .card {
            background: #1e293b;
            margin: 20px auto;
            padding: 20px;
            border-radius: 10px;
            width: 70%;
            text-align: left;
        }
    </style>
</head>

<body>

<h1>📩 AI Email Dashboard</h1>

<input type="text" id="search" placeholder="Search..." oninput="loadEmails()">

<select id="filter" onchange="loadEmails()">
    <option value="all">All</option>
    <option value="complaint">Complaint</option>
    <option value="query">Query</option>
    <option value="request">Request</option>
    <option value="feedback">Feedback</option>
    <option value="spam">Spam</option>
</select>

<div id="emails">Loading...</div>

<script>
async function loadEmails() {
    const res = await fetch("/emails");
    const data = await res.json();

    const search = document.getElementById("search").value.toLowerCase();
    const filter = document.getElementById("filter").value;

    let html = "";

    data.forEach(item => {

        if (filter !== "all" && item.result.intent !== filter) return;
        if (!item.email.toLowerCase().includes(search)) return;

        html += `
        <div class="card">
            <b>Email:</b><br>${item.email}<br><br>
            <b>Intent:</b> ${item.result.intent}<br>
            <b>Urgency:</b> ${item.result.urgency}<br>
            <b>Routing:</b> ${item.result.routing}<br>
            <b>Confidence:</b> ${item.result.confidence}%<br>
            <b>Priority:</b> ${item.result.priority_score}<br>
            <b>Keywords:</b> ${item.result.keywords}<br>
            <b>Reason:</b> ${item.result.reason}
        </div>
        `;
    });

    document.getElementById("emails").innerHTML = html;
}

setInterval(loadEmails, 5000);
loadEmails();
</script>

</body>
</html>
